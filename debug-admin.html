<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Admin - Diagnóstico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .test {
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ddd;
            background: #f9f9f9;
        }
        .test.pass {
            border-left-color: #28a745;
            background: #d4edda;
            color: #155724;
        }
        .test.fail {
            border-left-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }
        .test.pending {
            border-left-color: #ffc107;
            background: #fff3cd;
            color: #856404;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnóstico do Admin Panel</h1>

        <div id="results"></div>

        <button onclick="runDiagnostics()">Executar Diagnóstico</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Suas credenciais do Supabase
        const SUPABASE_URL = 'https://wdlzffnlnqbfzcflakgq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbHpmZm5sbnFiZnpjZmxha2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTI0NjYsImV4cCI6MjA4ODQ4ODQ2Nn0.5IZxl_uBIstK3hh-tLkz0CkWWnQF0pDpTar9FJSgkhM';

        async function runDiagnostics() {
            const results = document.getElementById('results');
            results.innerHTML = '';

            // Test 1: Variáveis definidas
            addTest(results, 'Checando variáveis',
                SUPABASE_URL && SUPABASE_ANON_KEY ? 'pass' : 'fail',
                SUPABASE_URL && SUPABASE_ANON_KEY
                    ? `✅ URL: ${SUPABASE_URL}\n✅ Key presente`
                    : '❌ Variáveis não definidas'
            );

            // Test 2: Supabase JS carregado
            addTest(results, 'Verificando biblioteca Supabase',
                window.supabase ? 'pass' : 'fail',
                window.supabase ? '✅ Supabase JS carregado' : '❌ Biblioteca não encontrada'
            );

            if (!window.supabase) return;

            // Test 3: Conectar ao Supabase
            let supabase;
            try {
                const { createClient } = window.supabase;
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                addTest(results, 'Conectando ao Supabase', 'pass', '✅ Cliente criado com sucesso');
            } catch (err) {
                addTest(results, 'Conectando ao Supabase', 'fail', `❌ Erro: ${err.message}`);
                return;
            }

            // Test 4: Verificar tabela contacts
            try {
                const { data, error } = await supabase
                    .from('contacts')
                    .select('count', { count: 'exact' })
                    .limit(1);

                if (error && error.code === 'PGRST116') {
                    addTest(results, 'Tabela "contacts" existe', 'fail',
                        `❌ Tabela não encontrada!\n\nPrecisa criar a tabela no Supabase:\n\n` +
                        `CREATE TABLE contacts (\n` +
                        `  id BIGINT PRIMARY KEY GENERATED BY DEFAULT AS IDENTITY,\n` +
                        `  name TEXT NOT NULL,\n` +
                        `  email TEXT NOT NULL,\n` +
                        `  message TEXT NOT NULL,\n` +
                        `  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n` +
                        `);`
                    );
                } else if (error) {
                    addTest(results, 'Tabela "contacts" existe', 'fail',
                        `❌ Erro ao acessar: ${error.message}`
                    );
                } else {
                    addTest(results, 'Tabela "contacts" existe', 'pass',
                        `✅ Tabela encontrada com dados`
                    );
                }
            } catch (err) {
                addTest(results, 'Tabela "contacts" existe', 'fail',
                    `❌ Erro: ${err.message}`
                );
            }

            // Test 5: Testar inserção
            try {
                const { data, error } = await supabase
                    .from('contacts')
                    .insert([{
                        name: 'Teste',
                        email: 'teste@teste.com',
                        message: 'Mensagem de teste'
                    }]);

                if (error) {
                    addTest(results, 'Inserir dados (teste)', 'fail',
                        `❌ Erro ao inserir:\n${error.message}\n\nCódigo: ${error.code}`
                    );
                } else {
                    addTest(results, 'Inserir dados (teste)', 'pass',
                        `✅ Inserção funcionando!\n\nAgora deletando dados de teste...`
                    );

                    // Deletar registro de teste
                    await supabase
                        .from('contacts')
                        .delete()
                        .eq('email', 'teste@teste.com');
                }
            } catch (err) {
                addTest(results, 'Inserir dados (teste)', 'fail',
                    `❌ Erro: ${err.message}`
                );
            }

            // Test 6: RLS Policy
            addTest(results, 'Row Level Security (RLS)', 'pending',
                `ℹ️ Se a tabela existe mas não consegue inserir, pode ser um problema de RLS.\n\n` +
                `Execute no SQL Editor do Supabase:\n\n` +
                `ALTER TABLE contacts ENABLE ROW LEVEL SECURITY;\n\n` +
                `CREATE POLICY "Anyone can insert contacts"\n` +
                `  ON contacts\n` +
                `  FOR INSERT\n` +
                `  WITH CHECK (true);`
            );

            // Test 7: localStorage
            const loggedIn = localStorage.getItem('adminLoggedIn');
            addTest(results, 'localStorage adminLoggedIn',
                loggedIn ? 'pass' : 'fail',
                loggedIn ? `✅ Valor: ${loggedIn}` : '❌ Não está definido'
            );
        }

        function addTest(container, title, status, message) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `
                <strong>${title}</strong><br>
                <pre>${message}</pre>
            `;
            container.appendChild(div);
        }

        // Executar automaticamente ao carregar
        window.addEventListener('load', runDiagnostics);
    </script>
</body>
</html>
