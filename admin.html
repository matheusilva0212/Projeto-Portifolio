<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contatos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Admin Dashboard */
        .admin-panel {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #999;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9f9f9;
            border-bottom: 2px solid #ddd;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .action-btn {
            padding: 6px 12px;
            margin-right: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-view {
            background: #17a2b8;
            color: white;
        }

        .btn-view:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal-body strong {
            color: #667eea;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex: 1;
            max-width: 300px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions button {
                flex: 1;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 10px;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🔐 Painel Admin</h1>
            <div class="error-message" id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Senha de Admin</label>
                    <input type="password" id="password" placeholder="Digite a senha" required>
                </div>
                <button type="submit" class="btn">Acessar</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="container">
            <div class="header">
                <h1>📧 Gerenciador de Contatos</h1>
                <div class="header-actions">
                    <button class="btn-secondary" id="exportBtn" onclick="exportToCSV()">
                        <i class="fas fa-download"></i> Exportar CSV
                    </button>
                    <button class="btn-secondary" id="logoutBtn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3>Total de Contatos</h3>
                    <div class="number" id="totalContacts">0</div>
                </div>
                <div class="stat-card">
                    <h3>Último Contato</h3>
                    <div class="number" id="lastContact" style="font-size: 16px;">-</div>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-header">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Buscar por nome ou email...">
                    </div>
                </div>
                <div id="tableContainer"></div>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhes do Contato</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== SUPABASE CONFIGURATION =====
        // ⚠️ ATUALIZE ESTAS LINHAS COM SUAS CREDENCIAIS DO SUPABASE
        const SUPABASE_URL = 'https://wdlzffnlnqbfzcflakgq.supabase.co'; // Cole a Project URL aqui
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbHpmZm5sbnFiZnpjZmxha2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTI0NjYsImV4cCI6MjA4ODQ4ODQ2Nn0.5IZxl_uBIstK3hh-tLkz0CkWWnQF0pDpTar9FJSgkhM'; // Cole a anon key aqui
        const ADMIN_PASSWORD = 'MsProg021201'; // MUDE ISSO PARA UMA SENHA FORTE!

        // Initialize Supabase Client with proper error handling
        let supabaseClient;
        if (window.supabase && typeof window.supabase.createClient === 'function') {
            const { createClient } = window.supabase;
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error('Supabase SDK failed to load. Check the <script> tag.');
        }

        let allContacts = [];

        // ===== LOGIN HANDLER =====
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdminPanel();
                loadContacts();
            } else {
                showLoginError('Senha incorreta!');
            }
        });

        function showLoginError(msg) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 3000);
        }

        // ===== AUTH CHECK =====
        function checkAuth() {
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                showAdminPanel();
                loadContacts();
            }
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('password').value = '';
            document.getElementById('tableContainer').innerHTML = '';
        }

        // ===== LOAD CONTACTS =====
        async function loadContacts() {
            const tableContainer = document.getElementById('tableContainer');
            tableContainer.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';

            try {
                if (!supabaseClient) {
                    throw new Error('Cliente Supabase não está inicializado');
                }
                const { data, error } = await supabaseClient
                    .from('contacts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allContacts = data || [];
                updateStats();
                renderTable(allContacts);
            } catch (err) {
                console.error('Erro:', err);
                tableContainer.innerHTML = '<div style="padding: 40px; color: red; text-align: center;">❌ Erro ao carregar contatos. Verifique a configuração do Supabase.</div>';
            }
        }

        function updateStats() {
            document.getElementById('totalContacts').textContent = allContacts.length;

            if (allContacts.length > 0) {
                const lastDate = new Date(allContacts[0].created_at);
                const formatted = lastDate.toLocaleDateString('pt-BR');
                document.getElementById('lastContact').textContent = formatted;
            }
        }

        function renderTable(contacts) {
            const tableContainer = document.getElementById('tableContainer');

            if (contacts.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Nenhum contato recebido ainda</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            contacts.forEach(contact => {
                const date = new Date(contact.created_at).toLocaleDateString('pt-BR');
                html += `
                    <tr>
                        <td><strong>${escapeHtml(contact.name)}</strong></td>
                        <td>${escapeHtml(contact.email)}</td>
                        <td>${date}</td>
                        <td>
                            <button class="action-btn btn-view" onclick="viewContact(${contact.id})">
                                <i class="fas fa-eye"></i> Ver
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteContact(${contact.id})">
                                <i class="fas fa-trash"></i> Deletar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = html;
        }

        // ===== SEARCH =====
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allContacts.filter(c =>
                c.name.toLowerCase().includes(query) ||
                c.email.toLowerCase().includes(query)
            );
            renderTable(filtered);
        });

        // ===== VIEW CONTACT =====
        function viewContact(id) {
            const contact = allContacts.find(c => c.id === id);
            if (!contact) return;

            const date = new Date(contact.created_at).toLocaleString('pt-BR');
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Nome:</strong><br>${escapeHtml(contact.name)}</p>
                <p><strong>Email:</strong><br><a href="mailto:${contact.email}">${contact.email}</a></p>
                <p><strong>Mensagem:</strong><br>${escapeHtml(contact.message).replace(/\n/g, '<br>')}</p>
                <p><strong>Recebido em:</strong><br>${date}</p>
            `;
            document.getElementById('viewModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('viewModal').classList.remove('show');
        }

        // ===== DELETE CONTACT =====
        async function deleteContact(id) {
            if (!confirm('Tem certeza que deseja deletar este contato?')) return;

            try {
                if (!supabaseClient) {
                    throw new Error('Cliente Supabase não está inicializado');
                }
                const { error } = await supabaseClient
                    .from('contacts')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                // Remove from local array
                allContacts = allContacts.filter(c => c.id !== id);
                updateStats();
                renderTable(allContacts);
                alert('Contato deletado com sucesso!');
            } catch (err) {
                alert('Erro ao deletar contato: ' + err.message);
            }
        }

        // ===== EXPORT TO CSV =====
        function exportToCSV() {
            if (allContacts.length === 0) {
                alert('Nenhum contato para exportar');
                return;
            }

            const headers = ['Nome', 'Email', 'Mensagem', 'Data'];
            const rows = allContacts.map(c => [
                c.name,
                c.email,
                c.message.replace(/"/g, '""'), // Escape quotes
                new Date(c.created_at).toLocaleString('pt-BR')
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${cell}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `contatos_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // ===== UTILITY FUNCTIONS =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('viewModal').addEventListener('click', (e) => {
            if (e.target.id === 'viewModal') {
                closeModal();
            }
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
